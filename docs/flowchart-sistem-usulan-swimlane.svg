  <line x1="150" y1="266" x2="150" y2="299" class="line" marker-end="url(#arrow)"/>
  <text x="127" y="286" class="label">Ya</text>
  <line x1="150" y1="360" x2="150" y2="397" class="line" marker-end="url(#arrow)"/>
  <line x1="162" y1="466" x2="162" y2="499" class="line" marker-end="url(#arrow)"/>
  <line x1="162" y1="568" x2="162" y2="601" class="line" marker-end="url(#arrow)"/>
  <line x1="162" y1="670" x2="162" y2="703" class="line" marker-end="url(#arrow)"/>
  <line x1="162" y1="772" x2="162" y2="805" class="line" marker-end="url(#arrow)"/>
  <line x1="162" y1="874" x2="162" y2="907" class="line" marker-end="url(#arrow)"/>
  <polyline points="265,944 285,944 285,958 297,958" class="line" marker-end="url(#arrow)"/>
  <polyline points="370,1026 370,1082 1060,1082 1060,134 1130,134" class="line" marker-end="url(#arrow)"/>
  <text x="405" y="1050" class="label">Ya</text>
  <polyline points="302,958 286,958 286,1030 162,1030 162,981" class="line" marker-end="url(#arrow)"/>
  <text x="284" y="987" class="label">Tidak</text>

  <!-- Panah kasir -->
  <line x1="730" y1="166" x2="730" y2="231" class="line" marker-end="url(#arrow)"/>
  <line x1="730" y1="300" x2="730" y2="365" class="line" marker-end="url(#arrow)"/>
  <line x1="730" y1="434" x2="730" y2="499" class="line" marker-end="url(#arrow)"/>
  <line x1="730" y1="568" x2="730" y2="615" class="line" marker-end="url(#arrow)"/>
  <polyline points="662,688 640,688 640,807" class="line" marker-end="url(#arrow)"/>
  <text x="627" y="742" class="label">Cash</text>
  <polyline points="798,688 860,688 860,807" class="line" marker-end="url(#arrow)"/>
  <text x="850" y="742" class="label">Midtrans</text>
  <polyline points="640,876 640,912 730,912 730,931" class="line" marker-end="url(#arrow)"/>
  <polyline points="860,876 860,912 730,912 730,931" class="line" marker-end="url(#arrow)"/>
  <polyline points="840,968 1060,968 1060,134 1130,134" class="line" marker-end="url(#arrow)"/>

