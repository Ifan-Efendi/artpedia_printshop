  <line x1="1250" y1="300" x2="1250" y2="365" class="line" marker-end="url(#arrow)"/>
  <line x1="1250" y1="434" x2="1250" y2="499" class="line" marker-end="url(#arrow)"/>
  <line x1="1250" y1="568" x2="1250" y2="633" class="line" marker-end="url(#arrow)"/>
  <line x1="1250" y1="702" x2="1250" y2="767" class="line" marker-end="url(#arrow)"/>
  <line x1="1250" y1="836" x2="1250" y2="929" class="line" marker-end="url(#arrow)"/>

  <!-- Pesanan selesai masuk riwayat/laporan kasir -->
