<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1120" viewBox="0 0 1500 1120">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#000"/>
    </marker>
    <style>
      .frame { fill: #fff; stroke: #000; stroke-width: 3; }
      .line { fill: none; stroke: #000; stroke-width: 3; }
      .shape { fill: #fff; stroke: #000; stroke-width: 3; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #000; text-anchor: middle; dominant-baseline: middle; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #000; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 14px; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #000; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <!-- Frame dan swimlane -->
  <rect x="2" y="2" width="1496" height="1116" class="frame"/>
  <line x1="500" y1="2" x2="500" y2="1118" class="line"/>
  <line x1="1000" y1="2" x2="1000" y2="1118" class="line"/>
  <line x1="2" y1="42" x2="1498" y2="42" class="line"/>

  <text x="250" y="22" class="title">Pelanggan</text>
  <text x="750" y="22" class="title">Kasir</text>
