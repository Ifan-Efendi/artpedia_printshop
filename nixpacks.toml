[phases.setup]
nixPkgs = ["...", "php82", "php82Packages.composer", "php82Extensions.pdo_mysql", "php82Extensions.gd"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader || composer update --no-dev --optimize-autoloader"]

[phases.build]
cmds = ["php artisan storage:link"]

[start]
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"
